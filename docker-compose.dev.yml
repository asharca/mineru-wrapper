services:
  ocr-center:
    build: .
    ports:
      - "3002:3001"
    environment:
      - MINERU_URL=http://10.0.10.2:8001
      - PADDLEOCR_URL=http://paddleocr:8000
      - DB_PATH=/app/data/ocr.db
      - PORT=3001
    volumes:
      - ocr-data:/app/data
      - ocr-uploads:/app/uploads
    restart: unless-stopped
    depends_on:
      - paddleocr

  paddleocr:
    build:
      context: ./packages/paddleocr
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
    restart: unless-stopped

volumes:
  ocr-data:
  ocr-uploads:
